<header class="site-header">
    <div class="container">
        <h1 class="site-title">
            <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        </h1>
        {{ if .Site.Params.description }}
        <p class="site-description">{{ .Site.Params.description }}</p>
        {{ end }}
        {{ if .Site.Params.telegram }}
        <p class="site-telegram">
            <a href="{{ .Site.Params.telegram }}" target="_blank" rel="noopener">Telegram канал</a>
        </p>
        {{ end }}
    </div>
</header>
