<header class="site-header">
    <div class="container">
        <h1 class="site-title">
            <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        </h1>
        {{ if .Site.Params.description }}
        <p class="site-description">{{ .Site.Params.description }}</p>
        {{ end }}
    </div>
</header>
